name: De-Googled Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Remove Trackers (Surgical Strip)
        run: |
          # Kill Google/Firebase dependencies in all gradle files
          find . -name "build.gradle" -type f -exec sed -i '/com.google.gms:google-services/d' {} +
          find . -name "build.gradle" -type f -exec sed -i '/com.google.firebase/d' {} +
          find . -name "build.gradle" -type f -exec sed -i '/play-services-ads/d' {} +
          find . -name "build.gradle" -type f -exec sed -i '/play-services-analytics/d' {} +
          
          # Strip tracker metadata from Manifests
          find . -name "AndroidManifest.xml" -type f -exec sed -i '/com.google.android.gms.measurement/d' {} +
          find . -name "AndroidManifest.xml" -type f -exec sed -i '/com.google.firebase/d' {} +
          
          # Delete the google config file if it exists
          find . -name "google-services.json" -delete

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug APK
        run: |
          # 1. Search for gradlew
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          # 2. If gradlew is missing, generate it
          if [ -z "$GRADLEW_PATH" ]; then
            echo "gradlew not found, generating a new one..."
            gradle wrapper
            GRADLEW_PATH="./gradlew"
          fi
          
          # 3. Move to the folder containing the build files
          cd $(dirname "$GRADLEW_PATH")
          
          # 4. Final build
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload De-Googled APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Private-Build
          path: "**/*.apk"
