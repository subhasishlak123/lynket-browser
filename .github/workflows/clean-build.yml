name: De-Googled Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Remove Trackers (Surgical Strip)
        run: |
          # Clean all gradle files in the whole repo
          find . -name "*.gradle*" -type f | xargs sed -i '/com.google.gms:google-services/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/com.google.firebase/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/play-services-ads/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/play-services-analytics/d' || true
          
          # Remove tracker metadata from Manifests
          find . -name "AndroidManifest.xml" -type f | xargs sed -i '/com.google.android.gms.measurement/d' || true
          find . -name "AndroidManifest.xml" -type f | xargs sed -i '/com.google.firebase/d' || true
          
          # Delete the google config file
          find . -name "google-services.json" -delete || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug APK
        run: |
          # 1. Navigate to the actual android project folder
          if [ -d "android-app" ]; then
            cd android-app
          fi

          # 2. Check if gradlew exists, if not, generate it
          if [ ! -f "gradlew" ]; then
            echo "Generating Gradle Wrapper..."
            gradle wrapper
          fi
          
          # 3. Build the app
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload De-Googled APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Private-Build
          path: "**/build/outputs/apk/debug/*.apk"
