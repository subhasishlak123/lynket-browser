name: De-Googled Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Remove Trackers (Surgical Strip)
        run: |
          # Kill Google/Firebase/Ads in all build files
          find . -name "*.gradle" -o -name "*.gradle.kts" -type f | xargs sed -i '/com.google.gms:google-services/d' || true
          find . -name "*.gradle" -o -name "*.gradle.kts" -type f | xargs sed -i '/com.google.firebase/d' || true
          find . -name "*.gradle" -o -name "*.gradle.kts" -type f | xargs sed -i '/play-services-ads/d' || true
          find . -name "*.gradle" -o -name "*.gradle.kts" -type f | xargs sed -i '/play-services-analytics/d' || true
          
          # Remove tracker metadata from Manifests
          find . -name "AndroidManifest.xml" -type f | xargs sed -i '/com.google.android.gms.measurement/d' || true
          find . -name "AndroidManifest.xml" -type f | xargs sed -i '/com.google.firebase/d' || true
          
          # Delete the google config file
          find . -name "google-services.json" -delete || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug APK
        run: |
          # Find the gradlew file
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Generating Gradle Wrapper..."
            gradle wrapper
            GRADLEW_PATH="./gradlew"
          fi
          
          chmod +x "$GRADLEW_PATH"
          
          # CRITICAL FIX: Run from the root but target the :app module
          # This avoids the "build-logic" error you saw
          ./gradlew :app:assembleDebug --stacktrace

      - name: Upload De-Googled APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Private-Build
          path: "**/build/outputs/apk/debug/*.apk"
