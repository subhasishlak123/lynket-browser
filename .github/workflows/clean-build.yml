name: De-Googled Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Hard Removal of Trackers
        run: |
          # 1. Physically delete Google/Firebase/Ads library folders if they exist in source
          find . -name "*firebase*" -type d -exec rm -rf {} + || true
          find . -name "*analytics*" -type d -exec rm -rf {} + || true
          find . -name "*crashlytics*" -type d -exec rm -rf {} + || true

          # 2. Strip dependencies from all gradle files
          find . -name "*.gradle*" -type f | xargs sed -i '/google-services/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/firebase/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/play-services-ads/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/crashlytics/d' || true

          # 3. Comment out any line of code that mentions Firebase or Analytics
          # This prevents "symbol not found" errors
          find . -name "*.java" -o -name "*.kt" -type f | xargs sed -i 's/.*Firebase.*/\/\/ &/' || true
          find . -name "*.java" -o -name "*.kt" -type f | xargs sed -i 's/.*Analytics.*/\/\/ &/' || true
          find . -name "*.java" -o -name "*.kt" -type f | xargs sed -i 's/.*Crashlytics.*/\/\/ &/' || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Main App
        run: |
          # Find gradlew
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          
          # Clean and Build only the App module
          ./gradlew clean :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Private-Build
          path: "**/app/build/outputs/apk/debug/*.apk"
