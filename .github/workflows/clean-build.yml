name: Privacy-Focused Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Block Trackers in Manifest
        run: |
          # 1. Disable Firebase/Analytics in the Manifest so they never start
          # We add 'tools:node="remove"' to the tracker components
          find . -name "AndroidManifest.xml" -type f -exec sed -i '/<application/a \    <meta-data android:name="firebase_analytics_collection_enabled" android:value="false" />' {} +
          find . -name "AndroidManifest.xml" -type f -exec sed -i '/<application/a \    <meta-data android:name="google_analytics_adid_collection_enabled" android:value="false" />' {} +
          
          # 2. Kill the internet permission for the app shell (privacy hard-lock)
          # Only the Custom Tabs (Chrome/Brave) will have web access
          find . -name "AndroidManifest.xml" -type f -exec sed -i '/android.permission.INTERNET/d' {} +

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Main App
        run: |
          # Find gradlew
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          
          # Build only the main app module
          ./gradlew clean :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Private-Build
          path: "**/app/build/outputs/apk/debug/*.apk"
