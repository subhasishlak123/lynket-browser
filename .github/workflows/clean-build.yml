name: De-Googled Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Remove Trackers
        run: |
          # Clean all build files
          find . -name "*.gradle*" -type f | xargs sed -i '/com.google.gms:google-services/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/com.google.firebase/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/play-services-ads/d' || true
          
          # Strip tracker metadata from Manifests
          find . -name "AndroidManifest.xml" -type f | xargs sed -i '/com.google.android.gms.measurement/d' || true
          find . -name "AndroidManifest.xml" -type f | xargs sed -i '/com.google.firebase/d' || true
          
          # Delete the google config file
          find . -name "google-services.json" -delete || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Main App
        run: |
          # 1. Locate the gradlew file (it might be in 'android-app' or root)
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          
          # 2. TARGET THE APP MODULE SPECIFICALLY
          # This command ensures you build the actual browser, not the playground list
          ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Real-App
          path: "**/app/build/outputs/apk/debug/*.apk"
