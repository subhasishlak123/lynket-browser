name: De-Googled Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Remove Trackers & Fix Code
        run: |
          # 1. Remove Google/Firebase dependencies
          find . -name "*.gradle*" -type f | xargs sed -i '/com.google.gms:google-services/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/com.google.firebase/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/play-services-ads/d' || true
          
          # 2. Fix potential 'missing package' errors caused by stripping
          # This tells the compiler to ignore missing tracking classes instead of crashing
          find . -name "*.java" -o -name "*.kt" -type f | xargs sed -i 's/import com.google.firebase/\/\/ import com.google.firebase/g' || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Main App
        run: |
          # Find gradlew and move to that folder
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          
          # RUN CLEAN FIRST, then build the app
          # --info will show us exactly what file is causing the crash if it fails
          ./gradlew clean :app:assembleDebug --info --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Real-App
          path: "**/app/build/outputs/apk/debug/*.apk"
