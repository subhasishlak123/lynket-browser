name: Privacy-Focused Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Main App
        run: |
          # 1. Find the project root
          ROOT_DIR=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | grep -v "build-logic" | head -n 1 | xargs dirname)
          cd "$ROOT_DIR"

          # 2. Ensure gradlew is ready
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          
          # 3. BUILD USING FLAGS (The safest way)
          # -PgoogleServices.enabled=false tells the app to skip Google/Firebase
          # We build ':lynket-app' specifically to avoid the 'playground' error
          ./gradlew clean :lynket-app:assembleDebug \
            -PgoogleServices.enabled=false \
            -PfirebaseCrashlyticsEnabled=false \
            --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Private-Build
          path: "**/*.apk"
