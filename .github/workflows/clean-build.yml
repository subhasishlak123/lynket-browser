name: De-Googled Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Surgical Tracker Removal
        run: |
          # 1. Kill dependencies in all gradle files
          find . -name "*.gradle*" -type f | xargs sed -i '/com.google.gms:google-services/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/com.google.firebase/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/play-services-ads/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/play-services-analytics/d' || true
          find . -name "*.gradle*" -type f | xargs sed -i '/crashlytics/d' || true

          # 2. Comment out all imports related to Firebase/Google Analytics
          find . -name "*.java" -o -name "*.kt" -type f | xargs sed -i 's/^import com.google.firebase/\/\/ import com.google.firebase/g' || true
          find . -name "*.java" -o -name "*.kt" -type f | xargs sed -i 's/^import com.google.android.gms.analytics/\/\/ import com.google.android.gms.analytics/g' || true

          # 3. Handle the 'Analytics' calls. 
          # This replaces 'Analytics.log' with '// Analytics.log' to prevent "cannot find symbol" errors.
          find . -name "*.java" -o -name "*.kt" -type f | xargs sed -i 's/Analytics.log/\/\/ Analytics.log/g' || true
          find . -name "*.java" -o -name "*.kt" -type f | xargs sed -i 's/FirebaseAnalytics/\/\/ FirebaseAnalytics/g' || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Main App
        run: |
          # Locate gradlew
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          
          # Clean first to ensure no old Playground files are interfering
          ./gradlew clean :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Private-Build
          path: "**/app/build/outputs/apk/debug/*.apk"
