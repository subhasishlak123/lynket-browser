name: Privacy-Focused Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Main App
        run: |
          # 1. Find the root settings.gradle file to identify the project root
          ROOT_DIR=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | grep -v "build-logic" | head -n 1 | xargs dirname)
          echo "Project root found at: $ROOT_DIR"
          cd "$ROOT_DIR"

          # 2. Block Trackers in the Manifest (Privacy)
          find . -name "AndroidManifest.xml" -type f -exec sed -i '/<application/a \    <meta-data android:name="firebase_analytics_collection_enabled" android:value="false" />' {} +
          find . -name "AndroidManifest.xml" -type f -exec sed -i '/<application/a \    <meta-data android:name="google_analytics_adid_collection_enabled" android:value="false" />' {} +
          
          # 3. Ensure gradlew is ready
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          
          # 4. Build the actual Android module
          # In Lynket, the module is often ':android-app' or ':app'
          # We try to build the whole project and pick the APK later
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lynket-Private-Build
          path: "**/*.apk"
